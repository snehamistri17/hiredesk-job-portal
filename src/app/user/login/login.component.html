<app-header></app-header>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">work<span>HireDesk</span></div>
      <p>Student Placement Portal</p>
    </div>
    <div class="auth-body">
      <h2 class="auth-title">Welcome Back! 👋</h2>
      <p class="auth-subtitle">Sign in to access your dashboard</p>

      <!-- Role Toggle -->
      <div class="role-toggle">
        <button type="button" class="role-btn" [class.active]="role === 'user'" (click)="role = 'user'">
          🎓 Student / User
        </button>
        <button type="button" class="role-btn" [class.active]="role === 'company'" (click)="role = 'company'">
          🏢 Company
        </button>
      </div>

      <!-- Pending note for company -->
      <div class="info-note" *ngIf="role === 'company'">
        ℹ️ Your account must be <strong>approved by admin</strong> before you can log in.
      </div>

      <div class="error-alert" *ngIf="error">⚠️ {{ error }}</div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="icon">📧</span>
          <input type="email" [(ngModel)]="email" placeholder="Enter your email" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input [type]="showPass ? 'text' : 'password'" [(ngModel)]="password" placeholder="Enter your password" />
          <button type="button" class="toggle-pass" (click)="showPass = !showPass">
            {{ showPass ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <div class="forgot-row">
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <button class="btn-full" (click)="login()" [disabled]="loading">
        {{ loading ? '⏳ Authenticating...' : '🚀 Sign In' }}
      </button>

      <div class="auth-link">
        Don't have an account? <a routerLink="/registration">Register Now</a>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
